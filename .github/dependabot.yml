version: 2
updates:
  # npm - JavaScript/Node.js dependencies
  # Useful if you add build tooling, testing frameworks, or Node.js scripts
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps-npm):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # pip - Python dependencies
  # Useful if you add Python scripts, testing, or documentation generation
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps-pip):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # GitHub Actions - Workflow automation
  # Keep CI/CD workflows and actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps-actions):"
      include: "scope"

  # Docker - Container images
  # Updates base images for any Dockerfiles in the project
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker):"
      include: "scope"

  # Bundler - Ruby dependencies
  # Useful if you add Ruby scripts or use Jekyll for documentation
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"
    commit-message:
      prefix: "chore(deps-bundler):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # Cargo - Rust dependencies
  # Useful if you add Rust tooling or integrate with ripgrep crates
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps-cargo):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # Composer - PHP dependencies
  # Useful if you add PHP tooling for documentation or CI/CD
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "chore(deps-composer):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # Go modules - Go dependencies
  # Useful if you add Go tooling for utilities or CLI tools
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps-go):"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"
